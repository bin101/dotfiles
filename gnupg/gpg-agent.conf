# https://github.com/drduh/config/blob/master/gpg-agent.conf
# https://www.gnupg.org/documentation/manuals/gnupg/Agent-Options.html
enable-ssh-support
ttyname $GPG_TTY
# Cache TTLs: 30 min default, 2 hour absolute max (April 2026 best practice)
default-cache-ttl 1800
max-cache-ttl 7200
# SSH key caching (same as above for consistency)
default-cache-ttl-ssh 1800
max-cache-ttl-ssh 7200
# Pinentry program (macOS with Homebrew)
pinentry-program /opt/homebrew/bin/pinentry-mac
# Uncomment only if using unattended/scripted GPG operations
#allow-loopback-pinentry
